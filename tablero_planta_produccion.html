<!DOCTYPE html>
<html lang="es">

<meta charset="UTF-8">

<title>Tablero de Producción</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;font-size:14px}
.app{max-width:1200px;margin:0 auto;padding:1rem}
.login-wrap{max-width:360px;margin:4rem auto}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px;background:#fff;border:1px solid #e5e5e0;border-radius:10px;padding:10px 14px}
.tabs{display:flex;gap:6px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:8px;border:1px solid #d5d5d0;font-size:12px;cursor:pointer;background:transparent;color:#666}
.tab.active{background:#eef4fd;color:#1a56a0;font-weight:500;border-color:#93b8e8}
.sec{display:none}.sec.active{display:block}
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.25rem}
.kcard{background:#f0efe8;border-radius:8px;padding:12px 14px}
.klabel{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.kval{font-size:20px;font-weight:500;color:#1a1a1a}
.ksub{font-size:11px;color:#888;margin-top:2px}
.kcard.ok .kval{color:#0f6e56}.kcard.warn .kval{color:#854f0b}.kcard.danger .kval{color:#a32d2d}
.card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.ctitle{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;font-size:10px;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:.04em;padding:5px 6px;border-bottom:1px solid #f0efe8}
td{padding:7px 6px;border-bottom:1px solid #f0efe8;color:#1a1a1a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;font-weight:500;white-space:nowrap}
.bok{background:#e1f5ee;color:#085041}.bwarn{background:#faeeda;color:#633806}.bdanger{background:#fcebeb;color:#791f1f}.binfo{background:#e6f1fb;color:#0c447c}.bgray{background:#f1efe8;color:#444}.bpurple{background:#eeedfe;color:#3c3489}.bteal{background:#e1f5ee;color:#085041}
.frow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:3px;flex:1;min-width:90px}
.fg label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.04em}
input,select{padding:7px 9px;font-size:12px;border-radius:8px;border:1px solid #d5d5d0;background:#fff;color:#1a1a1a;width:100%}
input[type=password]{letter-spacing:2px}
input:focus,select:focus{outline:none;border-color:#93b8e8;box-shadow:0 0 0 3px rgba(55,138,221,0.1)}
.btn{padding:7px 16px;border-radius:8px;border:1px solid #d5d5d0;background:#f0efe8;color:#1a1a1a;font-size:12px;cursor:pointer;font-weight:500;white-space:nowrap}
.btn:hover{background:#e5e5e0}
.btn-primary{background:#e6f1fb;color:#0c447c;border-color:#93b8e8}
.btn-primary:hover{background:#d0e5f8}
.btn-danger{background:#fcebeb;color:#791f1f;border-color:#f09595}
.btn-sm{padding:2px 8px;font-size:10px;border-radius:6px;border:1px solid #e0e0da;background:transparent;color:#888;cursor:pointer}
.btn-sm:hover{background:#f0efe8}
.alert-row{background:#faeeda;border:1px solid #f0a020;border-radius:8px;padding:8px 12px;font-size:12px;color:#633806;margin-bottom:6px}
.sechead{font-size:15px;font-weight:500;color:#1a1a1a;margin-bottom:1rem}
.bar-wrap{height:6px;background:#f0efe8;border-radius:3px;overflow:hidden;margin-top:3px}
.bar{height:100%;border-radius:3px}
.prot-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.ptab{padding:4px 12px;border-radius:99px;border:1px solid #d5d5d0;font-size:11px;cursor:pointer;background:transparent;color:#666}
.ptab.active{background:#e6f1fb;color:#0c447c;border-color:#93b8e8;font-weight:500}
.modo-tabs{display:flex;gap:0;margin-bottom:1rem;border:1px solid #d5d5d0;border-radius:8px;overflow:hidden}
.mtab{flex:1;padding:9px;font-size:12px;cursor:pointer;background:transparent;color:#666;border:none;border-right:1px solid #d5d5d0;text-align:center}
.mtab:last-child{border-right:none}
.mtab.active{background:#e6f1fb;color:#0c447c;font-weight:500}
.user-bar{display:flex;align-items:center;gap:10px;font-size:12px;color:#666}
.user-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;background:#e6f1fb;color:#0c447c}
.substk{padding:6px 10px;background:#f0efe8;border-radius:8px;font-size:12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.substk-low{background:#faeeda}
.substk-zero{background:#fcebeb}
.info-box{background:#f0efe8;border-radius:8px;padding:8px 12px;font-size:11px;color:#666;margin-bottom:10px}
.section-2col{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:700px){.section-2col{grid-template-columns:1fr}}
.pill-kg{background:#e6f1fb;color:#0c447c;font-size:10px;padding:1px 6px;border-radius:99px;margin-left:4px}
.pill-u{background:#eeedfe;color:#3c3489;font-size:10px;padding:1px 6px;border-radius:99px;margin-left:4px}
.month-filter{display:flex;align-items:center;gap:8px;margin-bottom:1rem;font-size:12px}
</style>
</head>

  return {
    ingresos:[],procesos:[],ventas:[],calidad:[],
    ss:JSON.parse(JSON.stringify(DEFAULT_SS)),
    pt:JSON.parse(JSON.stringify(DEFAULT_PT)),
    users:JSON.parse(JSON.stringify(DEFAULT_USERS)),
    empleados:JSON.parse(JSON.stringify(DEFAULT_EMPLEADOS)),
    teorico:JSON.parse(JSON.stringify(DEFAULT_TEORICO)),
    substocks:JSON.parse(JSON.stringify(DEFAULT_SUBSTOCKS)),
    productos:JSON.parse(JSON.stringify(DEFAULT_PRODUCTOS)),
  };
}

async function loadDBFromSupabase(){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/datos?id=eq.${SB_RECORD_ID}&select=valor`,{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
    });
    const data=await r.json();
    if(data&&data.length>0&&data[0].valor){
      return data[0].valor;
    }
  }catch(e){console.error('Error cargando desde Supabase:',e);}
  return null;
}

async function saveDB(){
  try{
    // Upsert — inserta si no existe, actualiza si ya existe
    await fetch(`${SB_URL}/rest/v1/datos`,{
      method:'POST',
      headers:{
        'apikey':SB_KEY,
        'Authorization':'Bearer '+SB_KEY,
        'Content-Type':'application/json',
        'Prefer':'resolution=merge-duplicates'
      },
      body:JSON.stringify({id:SB_RECORD_ID, valor:DB, updated_at:new Date().toISOString()})
    });
  }catch(e){console.error('Error guardando en Supabase:',e);}
}

// ============================================================
// HELPERS
// ============================================================
function today(){return new Date().toISOString().slice(0,10);}
function fmt(n,d=2){return(isNaN(n)||n===null||n===undefined)?'0.00':parseFloat(n).toFixed(d);}
function getSS(k){return DB.ss[k]||0;}
function setSS(k,v){DB.ss[k]=Math.max(0,parseFloat(v)||0);}
function getPT(k){return DB.pt[k]||0;}
function setPT(k,v){DB.pt[k]=Math.max(0,parseInt(v)||0);}

function findSSdef(key){
  for(const[p,list] of Object.entries(DB.substocks)){
    const f=list.find(s=>s.key===key);
    if(f)return{...f,proteina:p};
  }
  return null;
}

function fmtSS(key,val){
  const def=findSSdef(key);
  if(!def)return fmt(val,2)+' kg';
  return def.type==='u'?Math.round(val)+' u.':fmt(val,2)+' kg';
}

// Calcula kg de MP original que representa 1 unidad de un producto
// teniendo en cuenta la cadena de mermas
function calcKgMPTeorico(prod){
  const teo=DB.teorico[prod.proteina];
  if(!teo) return prod.kgPorcion;
  let kg=prod.kgPorcion;
  // Si pasa por coccion, revertir merma coccion
  if(prod.chain.includes('coccion')&&teo.coccion_pct){
    kg=kg/(teo.coccion_pct/100);
  }
  // Revertir desperdicio limpieza
  if(prod.chain.includes('limpieza')&&teo.desp_limpieza_pct){
    const rend=(100-teo.desp_limpieza_pct)/100;
    kg=kg/rend;
  }
  return kg;
}

// Calcula kg de MP real consumidos por unidad basado en procesos registrados
function calcKgMPReal(proteina){
  const procs=DB.procesos.filter(p=>p.proteina===proteina);
  const limpiezas=procs.filter(p=>p.tipo==='limpieza');
  const cocciones=procs.filter(p=>p.tipo==='coccion');
  const kgIn=limpiezas.reduce((a,p)=>a+p.kg_in,0);
  const kgDesp=limpiezas.reduce((a,p)=>a+p.kg_desperdicio,0);
  const kgCocIn=cocciones.reduce((a,p)=>a+p.kg_in,0);
  const kgCocOut=cocciones.reduce((a,p)=>a+p.kg_out,0);
  const rendLimp=kgIn>0?(kgIn-kgDesp)/kgIn:null;
  const rendCoc=kgCocIn>0?kgCocOut/kgCocIn:null;
  return{rendLimp,rendCoc,kgIn,kgDesp,kgCocIn,kgCocOut};
}

function checkPerm(tab){
  if(!CU)return false;
  return CU.perms[tab]!==false;
}

function initLoginSelect(){
  const sel=document.getElementById('login-user');
  sel.innerHTML='<option value="">Seleccionar...</option>'+
    DB.users.map(u=>`<option value="${u.id}">${u.nombre}</option>`).join('');
}

function doLogin(){
  const uid=document.getElementById('login-user').value;
  const pass=document.getElementById('login-pass').value;
  if(!uid){document.getElementById('login-error').textContent='Seleccioná un usuario.';return;}
  const user=DB.users.find(u=>u.id===uid);
  if(!user||pass!==user.pass){document.getElementById('login-error').textContent='Contraseña incorrecta.';return;}
  CU=user;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-screen').style.display='block';
  document.getElementById('user-label').textContent=user.nombre;
  document.getElementById('user-avatar').textContent=user.nombre.substring(0,2).toUpperCase();
  document.querySelectorAll('[data-tab]').forEach(btn=>{
    const tab=btn.dataset.tab;
    btn.style.display=(tab==='admin')?(user.role==='gerente'?'':'none'):(checkPerm(tab)?'':'none');
  });
  const firstTab=document.querySelector('#main-tabs .tab:not([style*="none"])');
  if(firstTab)firstTab.click();
  checkAlertas();
}

function doLogout(){
  CU=null;
  document.getElementById('main-screen').style.display='none';
  document.getElementById('login-screen').style.display='block';
  document.getElementById('login-pass').value='';
  document.getElementById('login-error').textContent='';
  initLoginSelect();
}

function showTab(t,el){
  if(!checkPerm(t)&&t!=='admin')return;
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById(t).classList.add('active');
  if(el)el.classList.add('active');
  renderTab(t);
}

function renderTab(t){

}

// ALERTAS

function checkAlertas(){
  const ac=document.getElementById('alerts-container');if(!ac)return;
  const alerts=[];
  DB.procesos.forEach(p=>{
    const teo=DB.teorico[p.proteina];if(!teo)return;
    if(p.tipo==='limpieza'&&p.kg_in>0){
      const r=p.kg_desperdicio/p.kg_in*100,t=teo.desp_limpieza_pct;
      if(Math.abs(r-t)>8)alerts.push(`Desvío desperdicio ${p.proteina} (${p.fecha}): real ${r.toFixed(1)}% vs teórico ${t}%`);
    }
    if(p.tipo==='coccion'&&p.kg_in>0&&teo.coccion_pct){
      const r=p.kg_out/p.kg_in*100,t=teo.coccion_pct;
      if(Math.abs(r-t)>8)alerts.push(`Desvío cocción ${p.proteina} (${p.fecha}): real ${r.toFixed(1)}% vs teórico ${t}%`);
    }
  });
  Object.values(DB.substocks).flat().forEach(s=>{
    const v=getSS(s.key);
    if(v<2&&v>0)alerts.push(`Stock bajo: ${s.label} — ${fmtSS(s.key,v)}`);
  });
  Object.entries(DB.pt).forEach(([k,v])=>{
    if(v<=5&&v>0)alerts.push(`Stock bajo PT: ${k} — ${v} u.`);
  });
  ac.innerHTML=alerts.map(a=>`<div class="alert-row">${a}</div>`).join('');
}

    .map(r=>r.fecha?r.fecha.slice(0,7):'').filter(Boolean))].sort().reverse();
  const selMes=document.getElementById('res-mes')?.value||'';
  const ff=r=>!selMes||(r.fecha&&r.fecha.startsWith(selMes));

  const proc=DB.procesos.filter(ff);
  const vents=DB.ventas.filter(ff);
  const cal=DB.calidad.filter(ff);

  const totalMerma=proc.filter(p=>p.tipo==='coccion').reduce((a,p)=>a+(p.kg_in-p.kg_out),0);
  const totalVU=vents.reduce((a,v)=>a+v.unidades,0);
  const rendGlobal=totalIn>0?((totalIn-totalDesp)/totalIn*100):0;
  const totalPT=Object.values(DB.pt).reduce((a,v)=>a+v,0);
  const totalCaidas=cal.reduce((a,r)=>a+r.caidas,0);
  const totalPedidos=cal.reduce((a,r)=>a+r.pedidos,0);
  const totalErrPick=cal.reduce((a,r)=>a+r.errores,0);
  const totalDev=cal.reduce((a,r)=>a+(r.devoluciones||0),0);
  const totalVendidasPer=vents.reduce((a,v)=>a+v.unidades,0);
  const pctError=totalPedidos>0?(totalErrPick/totalPedidos*100):0;
  const pctCaidas=totalVendidasPer>0?(totalCaidas/totalVendidasPer*100):0;
  const pctDev=totalVendidasPer>0?(totalDev/totalVendidasPer*100):0;

  // Stats por empleado
  const empStats={};
  DB.procesos.filter(ff).forEach(p=>{
    const emp=p.responsable; if(!emp) return;
    if(!empStats[emp]) empStats[emp]={limpieza:[],coccion:[]};
    const teo=DB.teorico[p.proteina];
    if(p.tipo==='limpieza'&&p.kg_in>0&&teo){
      const rReal=(p.kg_in-p.kg_desperdicio)/p.kg_in*100;
      empStats[emp].limpieza.push({proteina:p.proteina,rReal,rTeo:100-teo.desp_limpieza_pct,dev:rReal-(100-teo.desp_limpieza_pct)});
    }

      const rReal=p.kg_out/p.kg_in*100;

      const avgDevLimp=data.limpieza.length?data.limpieza.reduce((a,r)=>a+r.dev,0)/data.limpieza.length:null;
      const avgDevCoc=data.coccion.length?data.coccion.reduce((a,r)=>a+r.dev,0)/data.coccion.length:null;
      const dcL=avgDevLimp===null?'bgray':Math.abs(avgDevLimp)<3?'bok':Math.abs(avgDevLimp)<8?'bwarn':'bdanger';
      const dcC=avgDevCoc===null?'bgray':Math.abs(avgDevCoc)<3?'bok':Math.abs(avgDevCoc)<8?'bwarn':'bdanger';
      return `<tr>
        <td><strong>${emp}</strong></td>
        <td style="color:#888">${data.limpieza.length} proc.</td>
        <td>${avgDevLimp!==null?`<span class="badge ${dcL}">${avgDevLimp>=0?'+':''}${avgDevLimp.toFixed(1)}%</span>`:'<span class="badge bgray">—</span>'}</td>
        <td style="color:#888">${data.coccion.length} proc.</td>
        <td>${avgDevCoc!==null?`<span class="badge ${dcC}">${avgDevCoc>=0?'+':''}${avgDevCoc.toFixed(1)}%</span>`:'<span class="badge bgray">—</span>'}</td>
      </tr>`;
    }).join('');

  // Desvío kgMP real vs teórico por proteína
  const protDesvios=Object.keys(DB.substocks).map(prot=>{
    const teo=DB.teorico[prot];
    const r=calcKgMPReal(prot);
    const rendLimpTeo=teo?(100-teo.desp_limpieza_pct)/100:null;
    const rendCocTeo=teo?.coccion_pct?teo.coccion_pct/100:null;
    const rendLimpReal=r.rendLimp;
    const rendCocReal=r.rendCoc;
    const devLimp=rendLimpReal!==null&&rendLimpTeo?((rendLimpReal-rendLimpTeo)*100):null;
    const devCoc=rendCocReal!==null&&rendCocTeo?((rendCocReal-rendCocTeo)*100):null;
    return{prot,rendLimpTeo,rendLimpReal,devLimp,rendCocTeo,rendCocReal,devCoc};
  });

  el.innerHTML=`
  <div class="month-filter">
    <label style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.04em">Filtrar por mes</label>
    <select style="width:auto;min-width:140px" onchange="renderResumen()" id="res-mes">
      <option value="">Todos los períodos</option>
      ${months.map(m=>`<option value="${m}"${m===selMes?' selected':''}>${m}</option>`).join('')}
    </select>
  </div>

  <div style="font-size:12px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">Producción</div>
  <div class="kgrid">
    <div class="kcard ${rendGlobal>=70?'ok':rendGlobal>=55?'warn':'danger'}">
      <div class="klabel">Rendimiento limpieza</div><div class="kval">${rendGlobal.toFixed(1)}%</div><div class="ksub">neto / bruto</div>
    </div>
    <div class="kcard"><div class="klabel">Kg bruto ingresado</div><div class="kval">${fmt(totalIn,1)}</div><div class="ksub">período</div></div>
    <div class="kcard danger"><div class="klabel">Desperdicio</div><div class="kval">${fmt(totalDesp,1)} kg</div><div class="ksub">${totalIn>0?(totalDesp/totalIn*100).toFixed(1):0}%</div></div>
    <div class="kcard warn"><div class="klabel">Merma cocción</div><div class="kval">${fmt(totalMerma,1)} kg</div><div class="ksub">en proceso</div></div>
    <div class="kcard ok"><div class="klabel">Stock terminado</div><div class="kval">${totalPT}</div><div class="ksub">unidades</div></div>
    <div class="kcard"><div class="klabel">Unidades vendidas</div><div class="kval">${totalVU}</div><div class="ksub">período</div></div>
  </div>

  <div style="font-size:12px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;margin-top:.5rem">Calidad</div>
  <div class="kgrid" style="margin-bottom:1.5rem">
    <div class="kcard ${pctError<=2?'ok':pctError<=5?'warn':'danger'}">
      <div class="klabel">% error picking</div><div class="kval">${pctError.toFixed(1)}%</div><div class="ksub">${totalErrPick} err / ${totalPedidos} ped</div>
    </div>
    <div class="kcard ${pctCaidas<=1?'ok':pctCaidas<=3?'warn':'danger'}">
      <div class="klabel">% caídas por venc.</div><div class="kval">${pctCaidas.toFixed(1)}%</div><div class="ksub">${totalCaidas} / ${totalVendidasPer} vendidas</div>
    </div>
    <div class="kcard ${pctDev<=1?'ok':pctDev<=3?'warn':'danger'}">
      <div class="klabel">% devoluciones</div><div class="kval">${pctDev.toFixed(1)}%</div><div class="ksub">${totalDev} / ${totalVendidasPer} vendidas</div>
    </div>
  </div>

  <div class="card">
    <div class="ctitle">Rendimiento por empleado</div>
    <table>
      <thead><tr><th>Empleado</th><th>Limpiezas</th><th>Desvío limpieza</th><th>Cocciones</th><th>Desvío cocción</th></tr></thead>
      <tbody>${empStatsHTML}</tbody>

  </div>

  <div class="card">
    <div class="ctitle">Rendimientos reales vs teóricos</div>
    ${protDesvios.map(({prot,rendLimpTeo,rendLimpReal,devLimp,rendCocTeo,rendCocReal,devCoc})=>`
    <div style="padding:8px 0;border-bottom:1px solid #f0efe8">
      <div style="font-size:12px;font-weight:500;margin-bottom:6px">${prot}</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <div>
          <span style="font-size:10px;color:#888;text-transform:uppercase">Limpieza</span><br>
          <span style="font-size:11px">Teórico: <strong>${rendLimpTeo?((rendLimpTeo)*100).toFixed(1):'—'}%</strong></span>
          ${rendLimpReal!==null?`<span style="font-size:11px;margin-left:8px">Real: <strong>${(rendLimpReal*100).toFixed(1)}%</strong></span>
          <span class="badge ${devLimp!==null?Math.abs(devLimp)<3?'bok':Math.abs(devLimp)<8?'bwarn':'bdanger':'bgray'}" style="margin-left:4px">${devLimp!==null?(devLimp>=0?'+':'')+devLimp.toFixed(1)+'%':'Sin datos'}</span>`:'<span style="font-size:11px;color:#888;margin-left:8px">Sin datos</span>'}

function addCalidad(){
  const fecha=document.getElementById('q-fecha').value;
  if(!fecha){alert('Ingresá la fecha.');return;}
  DB.calidad.push({fecha,
    caidas:parseInt(document.getElementById('q-caidas').value)||0,
    pedidos:parseInt(document.getElementById('q-pedidos').value)||0,
    errores:parseInt(document.getElementById('q-errores').value)||0,
    devoluciones:parseInt(document.getElementById('q-devoluciones').value)||0,
    notas:document.getElementById('q-notas').value,
    usuario:CU.nombre,id:Date.now()});
  saveDB();
  ['q-caidas','q-pedidos','q-errores','q-devoluciones','q-notas'].forEach(id=>document.getElementById(id).value='');
  renderCalidad();
}
function delCalidad(i){if(CU.role!=='gerente')return;DB.calidad.splice(i,1);saveDB();renderResumen();}

  <p class="sechead">Registrar ingreso de materia prima</p>
  <div class="card">
    <div class="frow">
      <div class="fg" style="max-width:130px"><label>Fecha</label><input type="date" id="i-fecha" value="${today()}"></div>
      <div class="fg"><label>Proteína</label><select id="i-prot">${prots.map(p=>`<option>${p}</option>`).join('')}</select></div>
      <div class="fg" style="max-width:100px"><label>Kg bruto</label><input type="number" id="i-kg" placeholder="0.00" step="0.01"></div>
      <div class="fg" style="max-width:110px"><label>Costo $/kg</label><input type="number" id="i-costo" placeholder="0.00" step="0.01"></div>
      <div class="fg"><label>Proveedor</label><input type="text" id="i-prov" placeholder="Opcional"></div>
    </div>
    <button class="btn btn-primary" onclick="addIngreso()">+ Agregar ingreso</button>
  </div>
  <div class="card">
    <div class="ctitle">Ingresos registrados</div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Fecha</th><th>Proteína</th><th>Kg bruto</th><th>$/kg</th><th>Costo total</th><th>Proveedor</th><th>Usuario</th><th></th></tr></thead>
      <tbody>${DB.ingresos.length===0?'<tr><td colspan="8" style="text-align:center;color:#888;padding:1rem">Sin registros</td></tr>':
      DB.ingresos.slice().reverse().map((r,i)=>{const idx=DB.ingresos.length-1-i;
        return `<tr><td>${r.fecha}</td><td>${r.proteina}</td><td>${fmt(r.kg_bruto,2)}</td><td>$${fmt(r.costo_kg,2)}</td><td>$${fmt(r.kg_bruto*r.costo_kg,2)}</td><td>${r.proveedor||'-'}</td><td style="color:#888">${r.usuario||'-'}</td>
        <td>${CU.role==='gerente'?`<button class="btn-sm" onclick="delIngreso(${idx})">x</button>`:''}</td></tr>`;
      }).join('')}</tbody>
    </table></div>
  </div>`;
}

function addIngreso(){
  const fecha=document.getElementById('i-fecha').value;
  const proteina=document.getElementById('i-prot').value;
  const kg=parseFloat(document.getElementById('i-kg').value);
  const costo=parseFloat(document.getElementById('i-costo').value)||0;
  const prov=document.getElementById('i-prov').value;
  if(!fecha||isNaN(kg)||kg<=0){alert('Completá fecha, proteína y kg bruto.');return;}
  DB.ingresos.push({fecha,proteina,kg_bruto:kg,costo_kg:costo,proveedor:prov,usuario:CU.nombre,id:Date.now()});
  const mpSS=DB.substocks[proteina]?.find(s=>s.estado==='mp');
  if(mpSS)setSS(mpSS.key,getSS(mpSS.key)+kg);
  saveDB();
  document.getElementById('i-kg').value='';
  document.getElementById('i-costo').value='';
  document.getElementById('i-prov').value='';
  renderIngreso();
}

function delIngreso(i){
  if(CU.role!=='gerente')return;
  const r=DB.ingresos[i];
  const mpSS=DB.substocks[r.proteina]?.find(s=>s.estado==='mp');
  if(mpSS)setSS(mpSS.key,Math.max(0,getSS(mpSS.key)-r.kg_bruto));
  DB.ingresos.splice(i,1);saveDB();renderIngreso();
}

function renderProceso(){
  const el=document.getElementById('proceso');
  const prots=Object.keys(DB.substocks);
  const histHTML=DB.procesos.length===0?'<tr><td colspan="12" style="text-align:center;color:#888;padding:1rem">Sin registros</td></tr>':
    DB.procesos.slice().reverse().map((p,i)=>{
      const idx=DB.procesos.length-1-i;
      const teo=DB.teorico[p.proteina];
      const rend=p.kg_in>0?(p.kg_out/p.kg_in*100):0;
      let teoVal=null;
      if(p.tipo==='limpieza'&&teo)teoVal=100-teo.desp_limpieza_pct;
      if(p.tipo==='coccion'&&teo&&teo.coccion_pct)teoVal=teo.coccion_pct;
      const dev=teoVal?rend-teoVal:null;
      const dc=dev===null?'bgray':Math.abs(dev)<3?'bok':Math.abs(dev)<8?'bwarn':'bdanger';
      const tl=p.tipo==='limpieza'?'binfo':p.tipo==='coccion'?'bpurple':p.tipo==='apertura'?'bwarn':'bteal';
      return `<tr>
        <td>${p.fecha}</td><td>${p.proteina}</td>
        <td><span class="badge ${tl}">${p.tipo}</span></td>
        <td style="color:#888;font-size:11px">${p.origen||'—'}</td>
        <td style="color:#888;font-size:11px">${p.destino||'—'}</td>
        <td>${fmt(p.kg_in,2)}</td><td>${fmt(p.kg_out,2)}</td>
        <td>${fmt(p.kg_in-p.kg_out,2)}</td>
        <td>${p.tipo==='armado'?(p.unidades||0)+' u.':rend.toFixed(1)+'%'}</td>
        <td><span class="badge ${dc}">${dev!==null?(dev>=0?'+':'')+dev.toFixed(1)+'%':'—'}</span></td>
        <td style="color:#888">${p.responsable||'-'}</td>
        <td>${CU.role==='gerente'?`<button class="btn-sm" onclick="delProceso(${idx})">x</button>`:''}</td>
      </tr>`;
    }).join('');

  el.innerHTML=`
  <p class="sechead">Registrar proceso de producción</p>
  <div class="prot-tabs">${prots.map(p=>`<button class="ptab${p===activeProt?' active':''}" onclick="setProtProceso('${p}',this)">${p}</button>`).join('')}</div>
  <div class="modo-tabs">
    <button class="mtab${activeModo==='limpieza'?' active':''}" onclick="setModo('limpieza',this)">1. Limpieza</button>
    <button class="mtab${activeModo==='coccion'?' active':''}" onclick="setModo('coccion',this)">2. Cocción</button>
    <button class="mtab${activeModo==='apertura'?' active':''}" onclick="setModo('apertura',this)">3. Apertura de bolsa</button>
    <button class="mtab${activeModo==='armado'?' active':''}" onclick="setModo('armado',this)">4. Armado</button>
  </div>
  <div id="proceso-form"></div>
  <div class="card">
    <div class="ctitle">Historial de procesos</div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Fecha</th><th>Proteína</th><th>Tipo</th><th>Origen</th><th>Destino</th><th>Entrada</th><th>Salida</th><th>Desp./merma</th><th>Rend.</th><th>vs Teo.</th><th>Responsable</th><th></th></tr></thead>
      <tbody>${histHTML}</tbody>
    </table></div>
  </div>`;
  renderProcesoForm();
}

function setProtProceso(p,el){activeProt=p;document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('active'));if(el)el.classList.add('active');renderProcesoForm();}
function setModo(m,el){activeModo=m;document.querySelectorAll('.mtab').forEach(b=>b.classList.remove('active'));if(el)el.classList.add('active');renderProcesoForm();}

function calcLimpieza(){
  const ki=parseFloat(document.getElementById('pf-kgin')?.value)||0;
  const kd=parseFloat(document.getElementById('pf-desp')?.value)||0;
  const subs=DB.substocks[activeProt]?.filter(s=>s.estado==='crudo'||s.estado==='lpu')||[];
  const td=subs.reduce((a,s)=>{const el=document.getElementById('pf-'+s.key);return a+(parseFloat(el?.value)||0);},0);
  const resto=ki-kd-td;
  const prev=document.getElementById('pf-prev');if(!prev)return;
  prev.innerHTML=`Rendimiento: <strong>${ki>0?((ki-kd)/ki*100).toFixed(1):'-'}%</strong> | Distribuido: <strong>${fmt(td,2)}</strong> | Diferencia: <strong style="color:${Math.abs(resto)<0.1?'#0f6e56':'#e24b4a'}">${fmt(resto,2)} kg</strong>`;
}

function calcCoccion(){
  const ki=parseFloat(document.getElementById('pf-kgin')?.value)||0;
  const ko=parseFloat(document.getElementById('pf-kgout')?.value)||0;
  const prev=document.getElementById('pf-prev');if(!prev)return;
  const teo=DB.teorico[activeProt];
  prev.innerHTML=`Rendimiento: <strong>${ki>0?(ko/ki*100).toFixed(1):'-'}%</strong>${teo?.coccion_pct?` | Teórico: <strong>${teo.coccion_pct}%</strong>`:''} | Merma: <strong>${fmt(ki-ko,2)} kg</strong>`;
}

function updateArmadoSalidaLabel(){
  // Check if destination product uses units or kg
  const sel=document.getElementById('pf-producto');
  if(!sel) return;
  const prod=DB.productos.find(p=>p.ptKey===sel.value);
  const ssDef=prod?findSSdef(prod.substock):null;
  const label=document.getElementById('pf-salida-label');
  const input=document.getElementById('pf-unidades');
  if(!label||!input) return;
  if(ssDef?.type==='u'){
    label.textContent='Unidades obtenidas';
    input.step='1';input.placeholder='0';
  } else {
    label.textContent='Kg obtenidos';
    input.step='0.01';input.placeholder='0.00';
  }
}

function onProductoArmadoChange(){
  // Auto-seleccionar el sub-stock que corresponde al producto elegido
  const sel=document.getElementById('pf-producto');
  if(!sel) return;
  const opt=sel.options[sel.selectedIndex];
  const substock=opt?.dataset?.substock;
  if(substock){
    const origenSel=document.getElementById('pf-origen');
    if(origenSel){
      // Buscar la opción que tenga ese value
      for(let i=0;i<origenSel.options.length;i++){
        if(origenSel.options[i].value===substock){
          origenSel.selectedIndex=i;
          break;
        }
      }
    }
  }
  calcArmado();
}

function calcApertura(){
  const ki=parseFloat(document.getElementById('pf-kgin')?.value)||0;
  const ko=parseFloat(document.getElementById('pf-kgout')?.value)||0;
  const prev=document.getElementById('pf-prev');if(!prev)return;
  const merma=ki-ko;
  const pct=ki>0?(merma/ki*100):0;
  const teo=DB.teorico[activeProt];
  const teoPct=teo?.coccion_pct?(100-teo.coccion_pct):null;
  prev.innerHTML=`Merma real: <strong style="color:${merma<0?'#a32d2d':'#1a1a1a'}">${fmt(merma,3)} kg</strong> (${pct.toFixed(1)}%)${teoPct?` | Merma teórica: <strong>${teoPct.toFixed(1)}%</strong>`:''}
  | Stock después: <strong>${fmt(getSS(document.getElementById('pf-origen')?.value||'')-ki+ko,2)} kg</strong>`;
}

function addProcesoApertura(){
  const fecha=document.getElementById('pf-fecha').value;
  const origen=document.getElementById('pf-origen').value;
  const kgin=parseFloat(document.getElementById('pf-kgin').value);
  const kgout=parseFloat(document.getElementById('pf-kgout').value);
  const resp=document.getElementById('pf-resp')?.value||'';
  if(!fecha||isNaN(kgin)||isNaN(kgout)||kgin<=0){alert('Completá todos los campos.');return;}
  if(kgout>kgin){alert('Los kg reales no pueden ser mayores a los que entraron.');return;}
  if(getSS(origen)<kgin){if(!confirm(`Stock insuficiente: hay ${fmt(getSS(origen),2)} kg. ¿Continuás?`))return;}
  const ssO=findSSdef(origen);
  const merma=kgin-kgout;
  // Descuenta kgin del sub-stock, suma kgout (el neto es restar la merma)
  setSS(origen, getSS(origen)-kgin+kgout);
  DB.procesos.push({fecha,proteina:activeProt,tipo:'apertura',kg_in:kgin,kg_out:kgout,kg_desperdicio:merma,
    origen:ssO?.label||'',destino:ssO?.label||'',substock_origen:origen,substock_destino:origen,
    responsable:resp,usuario:CU.nombre,id:Date.now()});
  saveDB();renderProceso();checkAlertas();
}

function calcArmado(){
  const ki=parseFloat(document.getElementById('pf-kgin')?.value)||0;
  const uni=parseInt(document.getElementById('pf-unidades')?.value)||0;
  const sel=document.getElementById('pf-producto');if(!sel)return;
  const prod=DB.productos.find(p=>p.ptKey===sel.value);
  const prev=document.getElementById('pf-prev');if(!prev||!prod||!ki||!uni)return;
  const ku=(prod.kgPorcion*uni).toFixed(3);
  const rec=Math.max(0,ki-parseFloat(ku)).toFixed(3);
  const kgMPTeo=calcKgMPTeorico(prod);
  const kgMPReal=ki/uni;
  const devMP=((kgMPReal-kgMPTeo)/kgMPTeo*100);
  prev.innerHTML=`Kg cocido teórico para ${uni} u.: <strong>${ku} kg</strong> | Recorte est.: <strong>${rec} kg</strong> | kg MP/u real: <strong>${fmt(kgMPReal,3)}</strong> vs teo: <strong>${fmt(kgMPTeo,3)}</strong> <span class="badge ${Math.abs(devMP)<5?'bok':Math.abs(devMP)<15?'bwarn':'bdanger'}">${devMP>=0?'+':''}${devMP.toFixed(1)}%</span>`;
  if(!document.getElementById('pf-recorte').value)document.getElementById('pf-recorte').value=rec;
}

function addProcesoLimpieza(){
  const fecha=document.getElementById('pf-fecha').value;
  const kgin=parseFloat(document.getElementById('pf-kgin').value);
  const kdesp=parseFloat(document.getElementById('pf-desp').value)||0;
  const resp=document.getElementById('pf-resp')?.value||'';
  if(!fecha||isNaN(kgin)||kgin<=0){alert('Completá fecha y kg entrada.');return;}
  const subs=DB.substocks[activeProt]?.filter(s=>s.estado==='crudo'||s.estado==='lpu')||[];
  const dists={};
  subs.forEach(s=>{const el=document.getElementById('pf-'+s.key);dists[s.key]=parseFloat(el?.value)||0;});
  const mpSS=DB.substocks[activeProt]?.find(s=>s.estado==='mp');
  if(mpSS)setSS(mpSS.key,getSS(mpSS.key)-kgin);
  subs.forEach(s=>setSS(s.key,getSS(s.key)+(dists[s.key]||0)));
  DB.procesos.push({fecha,proteina:activeProt,tipo:'limpieza',kg_in:kgin,kg_out:kgin-kdesp,kg_desperdicio:kdesp,
    dists,origen:'MP entera',destino:subs.map(s=>s.label).join(' / '),responsable:resp,usuario:CU.nombre,id:Date.now()});
  saveDB();renderProceso();checkAlertas();
}

function addProcesoCoccion(){
  const fecha=document.getElementById('pf-fecha').value;
  const origen=document.getElementById('pf-origen').value;
  const destino=document.getElementById('pf-destino').value;
  const kgin=parseFloat(document.getElementById('pf-kgin').value);
  const kgout=parseFloat(document.getElementById('pf-kgout').value);
  const resp=document.getElementById('pf-resp')?.value||'';
  if(!fecha||isNaN(kgin)||isNaN(kgout)||kgin<=0){alert('Completá todos los campos.');return;}
  const ssO=findSSdef(origen);const ssD=findSSdef(destino);
  if(getSS(origen)<kgin){if(!confirm(`Stock insuficiente: hay ${fmt(getSS(origen),2)} kg. ¿Continuás?`))return;}
  setSS(origen,getSS(origen)-kgin);
  setSS(destino,getSS(destino)+kgout);
  DB.procesos.push({fecha,proteina:activeProt,tipo:'coccion',kg_in:kgin,kg_out:kgout,kg_desperdicio:kgin-kgout,
    origen:ssO?.label||'',destino:ssD?.label||'',substock_origen:origen,substock_destino:destino,
    responsable:resp,usuario:CU.nombre,id:Date.now()});
  saveDB();renderProceso();checkAlertas();
}

function addProcesoArmado(){
  const fecha=document.getElementById('pf-fecha').value;
  const origen=document.getElementById('pf-origen').value;
  const ptKey=document.getElementById('pf-producto').value;
  const kgin=parseFloat(document.getElementById('pf-kgin').value);
  const unidades=parseInt(document.getElementById('pf-unidades').value);
  const recorte=parseFloat(document.getElementById('pf-recorte').value)||0;
  const resp=document.getElementById('pf-resp')?.value||'';
  if(!fecha||isNaN(kgin)||isNaN(unidades)||kgin<=0||unidades<=0){alert('Completá todos los campos.');return;}
  const ssO=findSSdef(origen);
  if(getSS(origen)<kgin){if(!confirm('Stock insuficiente. ¿Continuás?'))return;}
  setSS(origen,getSS(origen)-kgin);
  setPT(ptKey,getPT(ptKey)+unidades);
  DB.procesos.push({fecha,proteina:activeProt,tipo:'armado',kg_in:kgin,kg_out:kgin-recorte,kg_desperdicio:recorte,
    unidades,origen:ssO?.label||'',destino:ptKey,substock_origen:origen,
    responsable:resp,usuario:CU.nombre,id:Date.now()});
  saveDB();renderProceso();checkAlertas();
}

function delProceso(i){
  if(CU.role!=='gerente'){alert('Solo el gerente puede eliminar.');return;}
  const p=DB.procesos[i];
  if(p.tipo==='limpieza'){
    const mpSS=DB.substocks[p.proteina]?.find(s=>s.estado==='mp');
    if(mpSS)setSS(mpSS.key,getSS(mpSS.key)+p.kg_in);
    if(p.dists)Object.entries(p.dists).forEach(([k,v])=>setSS(k,Math.max(0,getSS(k)-v)));
  }
  if(p.tipo==='coccion'){
    setSS(p.substock_origen,getSS(p.substock_origen)+p.kg_in);
    setSS(p.substock_destino,Math.max(0,getSS(p.substock_destino)-p.kg_out));
  }
  if(p.tipo==='apertura'){
    // Revierte: devuelve la merma al sub-stock (vuelve al peso original pre-apertura)
    setSS(p.substock_origen, getSS(p.substock_origen)+p.kg_in-p.kg_out);
  }
  if(p.tipo==='armado'){
    setSS(p.substock_origen,getSS(p.substock_origen)+p.kg_in);
    setPT(p.destino,Math.max(0,getPT(p.destino)-p.unidades));
  }
  DB.procesos.splice(i,1);saveDB();renderProceso();checkAlertas();
}

// ID del Google Sheet de pedidos
const SHEET_ID = '1ZpXsK-TYCjoSNYKrwh5EGjBuVsJqY-fxSy0kvSHt9oY';

async function importarPedidos(){
  const fechaFiltro = document.getElementById('imp-fecha').value.trim();
  const fechaReg = document.getElementById('imp-fecha-registro').value;
  const prev = document.getElementById('imp-preview');
  if(!fechaFiltro){alert('Ingresá la fecha del pedido (ej: 21-4)');return;}
  prev.innerHTML=`<div style="color:#888;font-size:12px;padding:8px 0">Leyendo planilla...</div>`;

  // Buscar la pestaña que corresponde a esa fecha
  const sheetName = `pedidos ${fechaFiltro}`;
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;

  try{
    const r = await fetch(url);
    const text = await r.text();
    // Google devuelve JSONP, hay que extraer el JSON
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    const rows = json.table.rows;

    // Agrupar por producto: columna A=fecha(0), B=cliente(1), C=ID(2), D=BASE(3), E=CANTIDAD(4)
    const totales = {};
    rows.forEach(row=>{
      if(!row.c||!row.c[0]||!row.c[3]||!row.c[4]) return;
      const fechaCell = row.c[0].v?.toString().trim();
      if(!fechaCell) return;
      const prod = row.c[3].v?.toString().trim();
      const cant = parseInt(row.c[4].v)||0;
      if(!prod||cant<=0) return;
      totales[prod] = (totales[prod]||0)+cant;
    });

    if(Object.keys(totales).length===0){
      prev.innerHTML=`<div class="alert-row">No se encontraron filas para la fecha "${fechaFiltro}". Verificá que el nombre de la pestaña sea exactamente "pedidos ${fechaFiltro}".</div>`;
      return;
    }

    // Cruzar con productos del tablero via stockNombre
    // La planilla guarda nombres sin 'g' al final (ej: '- 170' en vez de '- 170g')
    // Normalizamos para comparar
    function normalizarNombre(n){ return n.toLowerCase().trim().replace(/g$/, '').trim(); }
    const matcheados = [];
    const noMatcheados = [];
    Object.entries(totales).forEach(([stockNombre, cant])=>{
      const prod = DB.productos.find(p=>{
        if(!p.stockNombre) return false;
        return normalizarNombre(p.stockNombre) === normalizarNombre(stockNombre);
      });
      if(prod){
        const stockActual = getPT(prod.ptKey);
        matcheados.push({prod, cant, stockActual, stockNombre});
      } else {
        noMatcheados.push({stockNombre, cant});
      }
    });

    // Guardar en window para confirmar después
    window._importData = {matcheados, fechaReg};

    prev.innerHTML=`
    <div style="margin-top:12px">
      ${matcheados.length>0?`
      <div style="font-size:11px;font-weight:500;color:#0c447c;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">✅ Productos que se van a registrar (${matcheados.length})</div>
      <table style="margin-bottom:12px">
        <thead><tr><th>Producto</th><th>Unidades</th><th>Stock actual</th><th>Stock después</th></tr></thead>
        <tbody>${matcheados.map(({prod,cant,stockActual})=>{
          const post=stockActual-cant;
          return `<tr>
            <td>${prod.nombre}</td><td><strong>${cant}</strong></td>
            <td>${stockActual}</td>
            <td><strong style="color:${post<0?'#a32d2d':post<=5?'#854f0b':'#0f6e56'}">${post}</strong>${post<0?' ⚠️':''}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
      <button class="btn btn-primary" onclick="confirmarImport()">✅ Confirmar y registrar ${matcheados.length} productos</button>`:''}

      ${noMatcheados.length>0?`
      <div style="font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-top:12px;margin-bottom:6px">⚠️ Productos sin mapeo en el tablero (${noMatcheados.length})</div>
      <div style="font-size:11px;color:#888">${noMatcheados.map(({stockNombre,cant})=>`<span style="display:inline-block;background:#f0efe8;border-radius:4px;padding:2px 8px;margin:2px">${stockNombre} (${cant}u)</span>`).join('')}</div>
      <div style="font-size:11px;color:#888;margin-top:6px">Para mapearlos, agregá el "Nombre en planilla" en Configuración → Productos.</div>`:''}
    </div>`;
  }catch(e){
    console.error(e);
    prev.innerHTML=`<div class="alert-row">Error al leer la planilla. Verificá que sea pública (cualquiera con el link puede ver) y que la pestaña "pedidos ${fechaFiltro}" exista.</div>`;
  }
}

function confirmarImport(){
  const {matcheados, fechaReg} = window._importData||{};
  if(!matcheados||matcheados.length===0) return;
  matcheados.forEach(({prod,cant})=>{
    const sp = getPT(prod.ptKey);
    setPT(prod.ptKey, getPT(prod.ptKey)-cant);
    const sa = getPT(prod.ptKey);
    DB.ventas.push({fecha:fechaReg, producto:prod.nombre, unidades:cant,
      usuario:CU.nombre, sp, sa, id:Date.now()+Math.random()});
  });
  saveDB();
  window._importData = null;
  alert(`✅ Se registraron ${matcheados.length} productos correctamente.`);
  renderVentas();
  checkAlertas();
}

function updateVentaInfo(){
  const pN=document.getElementById('v-prod')?.value||'';
  const uni=parseInt(document.getElementById('v-uni')?.value)||0;
  const p=DB.productos.find(pp=>pp.nombre===pN);
  const prev=document.getElementById('v-prev');if(!prev||!p)return;
  const sa=getPT(p.ptKey);
  const post=sa-uni;
  const cls=post<0?'color:#a32d2d':post<=5?'color:#854f0b':'color:#0f6e56';
  const kgTeo=calcKgMPTeorico(p);
  const kgTeoTotal=kgTeo*uni;
  prev.innerHTML=`Proteína: <strong>${p.proteina}</strong> | Stock actual: <strong>${sa}</strong> → después: <strong style="${cls}">${post}</strong>${post<0?' <span style="color:#a32d2d">— INSUFICIENTE</span>':''}<br>
  <span style="color:#888">kg MP teórico por porción: <strong>${fmt(kgTeo,3)} kg</strong> | Total para ${uni} u.: <strong>${fmt(kgTeoTotal,3)} kg</strong> (porción ${fmt(p.kgPorcion,3)} kg × cadena de mermas)</span>`;
}

function addVenta(){
  const fecha=document.getElementById('v-fecha').value;
  const pN=document.getElementById('v-prod').value;
  const uni=parseInt(document.getElementById('v-uni').value);
  if(!fecha||isNaN(uni)||uni<=0){alert('Completá todos los campos.');return;}
  const p=DB.productos.find(pp=>pp.nombre===pN);
  const sp=p?getPT(p.ptKey):null;
  if(p&&getPT(p.ptKey)<uni){if(!confirm(`Stock insuficiente: ${getPT(p.ptKey)} u. ¿Continuás?`))return;}
  if(p)setPT(p.ptKey,getPT(p.ptKey)-uni);
  const sa=p?getPT(p.ptKey):null;
  DB.ventas.push({fecha,producto:pN,unidades:uni,usuario:CU.nombre,sp,sa,id:Date.now()});
  saveDB();document.getElementById('v-uni').value='';renderVentas();checkAlertas();
}

function delVenta(i){
  if(CU.role!=='gerente')return;
  const v=DB.ventas[i];
  const p=DB.productos.find(pp=>pp.nombre===v.producto);
  if(p)setPT(p.ptKey,getPT(p.ptKey)+v.unidades);
  DB.ventas.splice(i,1);saveDB();renderVentas();checkAlertas();
}

function renderBalance(){
  const el=document.getElementById('balance');
  let html=`<p class="sechead">Balance de masa por proteína</p>`;
  Object.keys(DB.substocks).forEach(prot=>{
    const kgBruto=DB.ingresos.filter(r=>r.proteina===prot).reduce((a,r)=>a+r.kg_bruto,0);
    const limpieza=DB.procesos.filter(r=>r.proteina===prot&&r.tipo==='limpieza');
    const coccion=DB.procesos.filter(r=>r.proteina===prot&&r.tipo==='coccion');
    const armado=DB.procesos.filter(r=>r.proteina===prot&&r.tipo==='armado');
    const kgDesp=limpieza.reduce((a,r)=>a+r.kg_desperdicio,0);
    const kgMerma=coccion.reduce((a,r)=>a+(r.kg_in-r.kg_out),0);
    const kgMermaApertura=DB.procesos.filter(r=>r.proteina===prot&&r.tipo==='apertura').reduce((a,r)=>a+r.kg_desperdicio,0);
    const kgRecA=armado.reduce((a,r)=>a+r.kg_desperdicio,0);
    const subsKg=DB.substocks[prot].filter(s=>s.type==='kg').reduce((a,s)=>a+getSS(s.key),0);
    const kgVendido=DB.ventas.reduce((a,v)=>{const p=DB.productos.find(pp=>pp.nombre===v.producto);return p&&p.proteina===prot?a+(calcKgMPTeorico(p)*v.unidades):a;},0);
    const totalExpl=kgDesp+kgMerma+kgMermaApertura+kgRecA+subsKg+kgVendido;
    const diff=kgBruto-totalExpl;
    const balanced=kgBruto===0||Math.abs(diff)<0.5;
    html+=`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="ctitle" style="margin-bottom:0">${prot}</div>
        <span class="badge ${balanced?'bok':Math.abs(diff)<2?'bwarn':'bdanger'}">${balanced?'Balanceado':'Desvío '+fmt(diff,2)+' kg'}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;font-size:12px">
        <div style="padding:8px;background:#f0efe8;border-radius:8px"><div style="font-size:10px;color:#888;margin-bottom:2px">Ingreso bruto</div><strong>${fmt(kgBruto,2)} kg</strong></div>
        <div style="padding:8px;background:#fcebeb;border-radius:8px"><div style="font-size:10px;color:#791f1f;margin-bottom:2px">Desperdicio</div><strong style="color:#791f1f">${fmt(kgDesp,2)} kg</strong></div>
        <div style="padding:8px;background:#faeeda;border-radius:8px"><div style="font-size:10px;color:#633806;margin-bottom:2px">Merma cocción</div><strong style="color:#633806">${fmt(kgMerma,2)} kg</strong></div>
        ${kgMermaApertura>0?`<div style="padding:8px;background:#faeeda;border-radius:8px"><div style="font-size:10px;color:#633806;margin-bottom:2px">Merma apertura bolsa</div><strong style="color:#633806">${fmt(kgMermaApertura,2)} kg</strong></div>`:''}
        ${kgRecA>0?`<div style="padding:8px;background:#faeeda;border-radius:8px"><div style="font-size:10px;color:#633806;margin-bottom:2px">Recorte armado</div><strong style="color:#633806">${fmt(kgRecA,2)} kg</strong></div>`:''}
        <div style="padding:8px;background:#eeedfe;border-radius:8px"><div style="font-size:10px;color:#3c3489;margin-bottom:2px">En sub-stocks kg</div><strong style="color:#3c3489">${fmt(subsKg,2)} kg</strong></div>
        <div style="padding:8px;background:#e1f5ee;border-radius:8px"><div style="font-size:10px;color:#085041;margin-bottom:2px">Vendido (kg MP teo)</div><strong style="color:#085041">${fmt(kgVendido,3)} kg</strong></div>
      </div>
      ${!balanced&&kgBruto>0?`<div style="margin-top:8px;font-size:11px;color:${Math.abs(diff)<2?'#633806':'#791f1f'}">Diferencia sin explicar: ${fmt(diff,2)} kg</div>`:''}
    </div>`;
  });
  el.innerHTML=html;
}

          <td><input type="number" value="${teo.coccion_pct||''}" step="0.1" style="width:80px" placeholder="N/A" id="teo-coc-${prot.replace(/ /g,'_')}"></td>
          <td style="color:#888;font-size:11px">${fmt(kgMP100,3)} kg MP → 100g ${rendCoc?'cocido':'listo'}</td>
          <td><button class="btn-sm" onclick="saveTeorico('${prot}')">Guardar</button></td>
        </tr>`;
      }).join('')}</tbody>
    </table>
  </div>`;
}

function saveTeorico(prot){
  const k=prot.replace(/ /g,'_');
  const desp=parseFloat(document.getElementById('teo-desp-'+k).value);
  const coc=parseFloat(document.getElementById('teo-coc-'+k).value);
  if(!isNaN(desp))DB.teorico[prot].desp_limpieza_pct=desp;
  DB.teorico[prot].coccion_pct=isNaN(coc)?null:coc;
  saveDB();alert('Guardado.');renderConfigTeorico();
}

function addProducto(){
  const nombre=document.getElementById('np-nombre').value.trim();
  const proteina=document.getElementById('np-prot').value;
  const kgPorcion=parseFloat(document.getElementById('np-kg').value);
  const substock=document.getElementById('np-substock').value;
  const chainStr=document.getElementById('np-chain').value;
  const ptKey=document.getElementById('np-ptkey').value.trim();
  const stockNombre=document.getElementById('np-stocknombre').value.trim();
  if(!nombre||!ptKey||isNaN(kgPorcion)||kgPorcion<=0){alert('Completá todos los campos.');return;}
  const chain=chainStr.split(',');
  DB.productos.push({nombre,proteina,kgPorcion,substock,chain,ptKey,stockNombre});
  if(DB.pt[ptKey]===undefined)DB.pt[ptKey]=0;
  saveDB();renderConfigProductos();
}

function delProducto(i){
  if(CU.role!=='gerente')return;
  if(!confirm('¿Eliminar este producto?'))return;
  DB.productos.splice(i,1);saveDB();renderConfigProductos();
}

function togglePerm(uid,tab,val){const u=DB.users.find(u=>u.id===uid);if(!u)return;u.perms[tab]=val;saveDB();}

function addUser(){
  const nombre=document.getElementById('nu-nombre').value.trim();
  const id=document.getElementById('nu-id').value.trim().replace(/\s/g,'');
  const pass=document.getElementById('nu-pass').value;
  const role=document.getElementById('nu-role').value;
  if(!nombre||!id||!pass){alert('Completá todos los campos.');return;}
  if(DB.users.find(u=>u.id===id)){alert('Ya existe un usuario con ese ID.');return;}
  const TABS=['resumen','ingreso','proceso','stock','ventas','balance','config','calidad'];
  const perms={admin:false};
  TABS.forEach(t=>perms[t]=role==='gerente'?true:['resumen','ingreso','proceso'].includes(t));
  DB.users.push({id,nombre,pass,role,perms});
  saveDB();renderAdmin();
}

function delUser(id){
  if(!confirm('¿Eliminar este usuario?'))return;
  DB.users=DB.users.filter(u=>u.id!==id);saveDB();renderAdmin();
}

function cambiarPass(){
  const uid=document.getElementById('pw-user').value;
  const nueva=document.getElementById('pw-nueva').value;
  if(!nueva){alert('Ingresá la nueva contraseña.');return;}
  const u=DB.users.find(u=>u.id===uid);if(!u)return;
  u.pass=nueva;saveDB();alert('Contraseña actualizada.');
  document.getElementById('pw-nueva').value='';
}

function addEmpleado(){
  const nombre=document.getElementById('emp-nombre').value.trim();
  if(!nombre){alert('Ingresá un nombre.');return;}
  if(!DB.empleados)DB.empleados=[];
  if(DB.empleados.includes(nombre)){alert('Ya existe ese empleado.');return;}
  DB.empleados.push(nombre);saveDB();renderAdmin();
}
function delEmpleado(i){
  DB.empleados.splice(i,1);saveDB();renderAdmin();
}

function resetDB(){
  if(!confirm('¿Seguro? No se puede deshacer.'))return;
  const{users,teorico,substocks,productos}=DB;
  DB={ingresos:[],procesos:[],ventas:[],calidad:[],
      ss:JSON.parse(JSON.stringify(DEFAULT_SS)),
      pt:JSON.parse(JSON.stringify(DEFAULT_PT)),
      users,teorico,substocks,productos};
  saveDB();alert('Base reseteada.');renderTab('resumen');
}

function exportarJSON(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`planta_backup_${today()}.json`;a.click();
}

function exportarExcel(){
  const lines=['TABLERO DE PRODUCCIÓN — '+today(),'',
    '=== INGRESOS ===','Fecha\tProteína\tKg bruto\t$/kg\tCosto total\tProveedor\tUsuario'];
  DB.ingresos.forEach(r=>lines.push(`${r.fecha}\t${r.proteina}\t${fmt(r.kg_bruto,2)}\t${fmt(r.costo_kg,2)}\t${fmt(r.kg_bruto*r.costo_kg,2)}\t${r.proveedor||''}\t${r.usuario||''}`));
  lines.push('','=== PROCESOS ===','Fecha\tProteína\tTipo\tOrigen\tDestino\tEntrada\tSalida\tDesp./merma\tUnidades\tResponsable\tUsuario');
  DB.procesos.forEach(p=>lines.push(`${p.fecha}\t${p.proteina}\t${p.tipo}\t${p.origen||''}\t${p.destino||''}\t${fmt(p.kg_in,2)}\t${fmt(p.kg_out,2)}\t${fmt(p.kg_in-p.kg_out,2)}\t${p.unidades||''}\t${p.responsable||''}\t${p.usuario||''}`));
  lines.push('','=== VENTAS ===','Fecha\tProducto\tProteína\tUnidades\tkg MP teórico/u\tTotal kg MP teo\tStock prev.\tStock act.\tUsuario');
  DB.ventas.forEach(v=>{
    const p=DB.productos.find(pp=>pp.nombre===v.producto);
    const kgTeo=p?calcKgMPTeorico(p):null;
    lines.push(`${v.fecha}\t${v.producto}\t${p?p.proteina:''}\t${v.unidades}\t${kgTeo?fmt(kgTeo,3):''}\t${kgTeo?fmt(kgTeo*v.unidades,3):''}\t${v.sp??''}\t${v.sa??''}\t${v.usuario||''}`);
  });
  lines.push('','=== CALIDAD ===','Fecha\tCaídas\tPedidos\tErrores\t% error\tNotas\tUsuario');
  DB.calidad.forEach(r=>lines.push(`${r.fecha}\t${r.caidas}\t${r.pedidos}\t${r.errores}\t${r.pedidos>0?(r.errores/r.pedidos*100).toFixed(1):0}%\t${r.notas||''}\t${r.usuario||''}`));
  const blob=new Blob(['\uFEFF'+lines.join('\n')],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`planta_produccion_${today()}.xls`;a.click();
}

function migrateDB(){
  Object.values(DEFAULT_SUBSTOCKS).flat().forEach(s=>{
    if(DB.ss[s.key]===undefined)DB.ss[s.key]=0;
  });
  if(!DB.substocks)DB.substocks=JSON.parse(JSON.stringify(DEFAULT_SUBSTOCKS));
  if(!DB.teorico)DB.teorico=JSON.parse(JSON.stringify(DEFAULT_TEORICO));
  if(!DB.productos)DB.productos=JSON.parse(JSON.stringify(DEFAULT_PRODUCTOS));
  if(!DB.users)DB.users=JSON.parse(JSON.stringify(DEFAULT_USERS));
  if(!DB.empleados)DB.empleados=[];
  DB.productos.forEach(p=>{
    if(!p.chain)p.chain=['limpieza','coccion'];
    if(!p.kgPorcion&&p.kgLPU)p.kgPorcion=p.kgLPU;
    if(p.stockNombre===undefined){
      // Intentar mapear desde defaults
      const def=DEFAULT_PRODUCTOS.find(d=>d.ptKey===p.ptKey);
      p.stockNombre=def?.stockNombre||'';
    }
  });
}
